<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>복리 계산기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 2rem 1rem; }
    .container { background: #fff; border-radius: 16px; padding: 2rem; width: 100%; max-width: 640px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    h1 { font-size: 20px; font-weight: 500; color: #1a1a18; margin-bottom: 0.25rem; }
    .subtitle { font-size: 13px; color: #888780; margin-bottom: 1.75rem; }
    .ctrl { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
    .ctrl label { font-size: 13px; color: #5f5e5a; min-width: 80px; }
    .ctrl input[type=range] { flex: 1; accent-color: #1D9E75; height: 4px; }
    .ctrl span { font-size: 14px; font-weight: 500; min-width: 60px; text-align: right; color: #1a1a18; }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 1.5rem 0; }
    .card { background: #f5f5f3; border-radius: 8px; padding: 0.85rem 1rem; }
    .card-label { font-size: 12px; color: #888780; margin-bottom: 4px; }
    .card-val { font-size: 20px; font-weight: 500; color: #1a1a18; }
    .card-val.green { color: #1D9E75; }
    .legend { display: flex; gap: 20px; margin-bottom: 0.75rem; font-size: 12px; color: #5f5e5a; }
    .legend span { display: flex; align-items: center; gap: 6px; }
    .dot { width: 12px; height: 3px; border-radius: 2px; }
    .chart-wrap { position: relative; width: 100%; height: 260px; }
    .formula { margin-top: 1.5rem; padding: 1rem; background: #f5f5f3; border-radius: 8px; font-size: 13px; color: #5f5e5a; line-height: 1.6; }
    .formula strong { color: #1a1a18; font-weight: 500; }
    code { background: #e8e8e5; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
<div class="container">
  <h1>복리 계산기</h1>
  <p class="subtitle">슬라이더를 조정해 복리와 단리의 차이를 확인하세요</p>
  <div class="ctrl"><label>원금</label><input type="range" id="principal" min="100000" max="10000000" step="100000" value="1000000"><span id="p-out">100만원</span></div>
  <div class="ctrl"><label>연 수익률</label><input type="range" id="rate" min="1" max="20" step="0.5" value="7"><span id="r-out">7%</span></div>
  <div class="ctrl"><label>투자 기간</label><input type="range" id="years" min="1" max="40" step="1" value="20"><span id="y-out">20년</span></div>
  <div class="cards">
    <div class="card"><div class="card-label">원금</div><div class="card-val" id="c-principal">100만</div></div>
    <div class="card"><div class="card-label">총 이자</div><div class="card-val green" id="c-interest">287만</div></div>
    <div class="card"><div class="card-label">최종 금액</div><div class="card-val" id="c-total">387만</div></div>
  </div>
  <div class="legend">
    <span><span class="dot" style="background:#1D9E75;"></span>복리</span>
    <span><span class="dot" style="background:#b4b2a9;"></span>단리</span>
  </div>
  <div class="chart-wrap"><canvas id="chart"></canvas></div>
  <div class="formula"><strong>복리 공식:</strong> 최종금액 = 원금 × <code>(1 + 수익률)^기간</code><br>이자에 이자가 붙어 시간이 지날수록 성장이 가속됩니다.</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const fmt = v => {
    if (v >= 100000000) return (v / 100000000).toFixed(1) + '억';
    if (v >= 10000) return Math.round(v / 10000) + '만';
    return v.toLocaleString();
  };
  let chart;
  function calc() {
    const P = +document.getElementById('principal').value;
    const r = +document.getElementById('rate').value / 100;
    const n = +document.getElementById('years').value;
    document.getElementById('p-out').textContent = fmt(P) + '원';
    document.getElementById('r-out').textContent = (+document.getElementById('rate').value) + '%';
    document.getElementById('y-out').textContent = n + '년';
    const labels = [], compound = [], simple = [];
    for (let i = 0; i <= n; i++) {
      labels.push(i + '년');
      compound.push(Math.round(P * Math.pow(1 + r, i)));
      simple.push(Math.round(P * (1 + r * i)));
    }
    const final = compound[n];
    document.getElementById('c-principal').textContent = fmt(P);
    document.getElementById('c-interest').textContent = fmt(final - P);
    document.getElementById('c-total').textContent = fmt(final);
    if (chart) {
      chart.data.labels = labels;
      chart.data.datasets[0].data = compound;
      chart.data.datasets[1].data = simple;
      chart.update();
    } else {
      chart = new Chart(document.getElementById('chart'), {
        type: 'line',
        data: { labels, datasets: [
          { label: '복리', data: compound, borderColor: '#1D9E75', backgroundColor: 'rgba(29,158,117,0.08)', fill: true, tension: 0.35, pointRadius: 0, borderWidth: 2 },
          { label: '단리', data: simple, borderColor: '#b4b2a9', backgroundColor: 'transparent', borderDash: [5, 4], tension: 0, pointRadius: 0, borderWidth: 1.5 }
        ]},
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + ctx.dataset.label + ': ' + fmt(ctx.parsed.y) + '원' } } },
          scales: {
            x: { ticks: { maxTicksLimit: 8, font: { size: 11 }, color: '#888780' }, grid: { display: false } },
            y: { ticks: { font: { size: 11 }, color: '#888780', callback: v => fmt(v) }, grid: { color: 'rgba(136,135,128,0.12)' } }
          }
        }
      });
    }
  }
  ['principal', 'rate', 'years'].forEach(id => document.getElementById(id).addEventListener('input', calc));
  calc();
</script>
</body>
</html>
